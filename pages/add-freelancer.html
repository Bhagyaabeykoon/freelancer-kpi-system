<!DOCTYPE html>
<html>
<head>
    <title>Add Freelancer</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>FKPI</h2>

        <ul>

            <li onclick="window.location.href='../index.html'">
                Dashboard
            </li>

            <li onclick="window.location.href='projects.html'">
                Projects
            </li>

            <li onclick="window.location.href='tasks.html'">
                Task Management
            </li>

            <li class="active"
                onclick="window.location.href='freelancers.html'">
                Freelancers
            </li>

            <li onclick="window.location.href='reports.html'">
                Reports
            </li>

            <li onclick="window.location.href='analytics.html'">
                KPI Analytics
            </li>

        </ul>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>Add Freelancer</h1>

        </div>

        <div class="card">

            <form id="freelancerForm">

                <div class="form-group">

                    <label>Full Name</label>
                    <input type="text" id="fullName" required>

                </div>

                <div class="form-group">

                    <label>Email</label>
                    <input type="email" id="email" required>

                </div>

                <div class="form-group">

                    <label>Phone Number</label>
                    <input type="text" id="phone" required>

                </div>

                <div class="form-group">

                    <label>City</label>
                    <input type="text" id="city">

                </div>

                <div class="form-group">

                    <label>Skills</label>
                    <input type="text" id="skills">

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <select id="status">

                        <option>Available</option>
                        <option>Busy</option>
                        <option>Inactive</option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Freelancer

                </button>

            </form>

        </div>

    </div>

</div>

<script src="../js/modules/add-freelancer.js"></script>

</body>
</html>
