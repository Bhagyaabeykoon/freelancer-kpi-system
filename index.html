<!DOCTYPE html>
<html>

<head>
    <title>Freelancer KPI System</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->

        <div class="sidebar">

            <h2>FKPI</h2>

            <ul>

                <li class="active"
                    onclick="window.location.href='index.html'">
                    Dashboard
                </li>

                <li
                    onclick="window.location.href='pages/projects.html'">
                    Projects
                </li>

                <li
                    onclick="window.location.href='pages/tasks.html'">
                    Task Management
                </li>

                <li
                    onclick="window.location.href='pages/freelancers.html'">
                    Freelancers
                </li>

                <li
                    onclick="window.location.href='pages/reports.html'">
                    Reports
                </li>

                <li
                    onclick="window.location.href='pages/analytics.html'">
                    KPI Analytics
                </li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="main">

            <!-- Top Bar -->

            <div class="topbar">
                <h1>Dashboard</h1>
            </div>

            <!-- KPI Cards -->

            <div class="cards">

                <div class="card">
                    <h3>Total Projects</h3>
                    <h2 id="totalProjects">0</h2>
                </div>

                <div class="card">
                    <h3>Total Tasks</h3>
                    <h2 id="totalTasks">0</h2>
                </div>

                <div class="card">
                    <h3>Completed Tasks</h3>
                    <h2 id="completedTasks">0</h2>
                </div>

                <div class="card">
                    <h3>Achievement %</h3>
                    <h2 id="achievement">0%</h2>
                </div>

            </div>

            <!-- Chart Section -->

            <div class="chart-container-wrapper">

                <h2>Task Status Overview</h2>

                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>

            </div>

            <div class="section">

                <h2>Top Performer of the Month 🏆</h2>

                <div id="topPerformerCard">

                </div>

            </div>

            <!-- Upcoming Deadlines -->

            <div class="section">

                <h2>Upcoming Deadlines</h2>

                <div
                    id="deadlineCards"
                    class="projects-grid">

                </div>

            </div>

            <!-- Recent Tasks -->

            <div class="section">

                <h2>Recent Projects</h2>

                <div
                    id="recentProjectsCards"
                    class="projects-grid">

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/modules/dashboard.js"></script>

</body>

</html>
